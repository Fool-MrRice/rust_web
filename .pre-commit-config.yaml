repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: rustfmt --check
        language: system
        types: [ rust ]
        pass_filenames: true

      - id: clippy
        name: clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        pass_filenames: false
        always_run: true